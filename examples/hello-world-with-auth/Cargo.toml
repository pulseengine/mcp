[package]
name = "hello-world-with-auth"
version = "0.1.0"
edition = "2021"
description = "MCP Server with pulseengine-security middleware (rmcp + Axum)"
publish = false

[dependencies]
rmcp = { version = "1.3", features = ["server", "macros", "transport-streamable-http-server"] }
pulseengine-security = { path = "../../pulseengine-security" }
axum = "0.7"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }
serde = { version = "1", features = ["derive"] }
schemars = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
