[package]
name = "resources-demo"
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "resources-demo"
path = "src/main.rs"

[dependencies]
rmcp = { version = "1.3", features = ["server", "macros", "transport-io"] }
pulseengine-mcp-resources = { path = "../../pulseengine-mcp-resources" }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1.0"
matchit = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
