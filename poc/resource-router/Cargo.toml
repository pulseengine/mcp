[package]
name = "poc-resource-router"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
rmcp = { version = "1.3", features = ["server", "macros", "transport-io"] }
matchit = "0.8"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1"
