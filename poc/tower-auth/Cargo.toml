[package]
name = "poc-tower-auth"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
rmcp = { version = "1.3", features = ["server", "macros", "transport-streamable-http-server"] }
axum = "0.7"
tower = "0.5"
tower-service = "0.3"
tower-layer = "0.3"
http = "1"
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }
serde = { version = "1", features = ["derive"] }
schemars = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1"
